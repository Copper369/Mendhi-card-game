services:
  - type: web
    name: mendhikot-game
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 3001
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: NODE_ENV
        value: production
